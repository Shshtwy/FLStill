    type: application
    platform: macOS
    sources:
      - Sources/FLStill
      - path: FirstLastFrame_NoWhite.icns
        buildPhase: resources
    settings:
      base:
        PRODUCT_NAME: FLStill
        SWIFT_EMIT_LOC_STRINGS: YES
    scheme:
      testTargets: []
