<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FLStill</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="controls">
        <label><input id="useDefaultFolder" type="checkbox" /> Default folder</label>
        <label><input id="exportFiveFrames" type="checkbox" /> Export 5 Frames</label>
        <label><input id="useCustomCapture" type="checkbox" /> Custom</label>

        <div class="segmented" id="outputMode">
          <button data-mode="match-source" class="active">Match Source</button>
          <button data-mode="landscape">16:9</button>
          <button data-mode="portrait">9:16</button>
        </div>

        <button id="setFolder" class="secondary">Choose Folder</button>
        <button id="toggleTop" class="secondary">Pin</button>
      </section>

      <section id="dropZone" class="drop-zone">
        <div id="defaultMessage" class="message-block">
          <h1>Drop your mp4 videos here</h1>
          <p id="status">Supports .mp4</p>
        </div>

        <div id="customBlock" class="message-block hidden">
          <video id="previewVideo" controls></video>
          <div class="scrub">
            <input id="timeSlider" type="range" min="0" max="1" step="0.001" value="0" />
            <div class="time-row">
              <span id="timeNow">0:00</span>
              <span id="timeDuration">0:00</span>
            </div>
            <button id="captureFrame" class="camera">Capture Frame</button>
          </div>
        </div>
      </section>

      <section class="footer">
        <progress id="progress" max="1" value="0"></progress>
        <p id="error" class="error"></p>
      </section>
    </main>

    <script src="./renderer.js"></script>
  </body>
</html>
